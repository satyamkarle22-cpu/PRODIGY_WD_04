<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- PASTE THE CODE HERE -->

    <div class="container">

        <h1>🌦 Weather App</h1>

        <div class="search-box">

            <input
            type="text"
            id="city"
            placeholder="Search City">

            <button onclick="getWeather()">
                Search
            </button>

        </div>

        <div class="weather-icon" id="icon">
            ☀️
        </div>

        <h2 class="city" id="cityName">
            Pune
        </h2>

        <div class="temp" id="temperature">
            25°C
        </div>

        <p id="description">
            Clear Sky
        </p>

        <div class="details">

            <div class="card">
                💧
                <p id="humidity">60%</p>
            </div>

            <div class="card">
                🌬
                <p id="wind">5 m/s</p>
            </div>

        </div>

        <div class="time" id="clock"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
